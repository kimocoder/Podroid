# Podroid: use the in-kernel overlayfs driver instead of fuse-overlayfs.
# Kernel >= 5.11 (we ship 6.6.87 with CONFIG_OVERLAY_FS=y) and Podman runs
# as root inside this VM, so the FUSE indirection is pure overhead.
[storage]
driver = "overlay"
runroot = "/run/containers/storage"
graphroot = "/var/lib/containers/storage"

[storage.options]
# Empty mount_program forces native kernel overlay (default would
# auto-pick fuse-overlayfs if the binary is present).
mount_program = ""
